<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClanHub | First Rule</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="blood-splatter"></div>
    
    <div class="login-container">
        <form id="login-form">
            <h1 class="glitch" data-text="CLANHUB">CLANHUB</h1>
            <p class="subtitle">PROJECT MAYHEM</p>

            <div class="input-group">
                <input type="email" id="login-email" placeholder="EMAIL ADDRESS" required>
            </div>

            <div class="input-group">
                <input type="password" id="login-password" placeholder="PASSWORD" required>
            </div>

            <button type="submit" id="login-btn">ENTER THE RING</button>
            
            <div class="form-footer">
                <p id="error-message"></p>
                <a href="#">FORGOT PASSWORD?</a>
                <div class="register">
                    NOT A MEMBER? <a href="#">JOIN THE CLAN</a>
                </div>
            </div>
        </form>
    </div>

    <script type="module" src="auth.js"></script>
</body>
</html>
