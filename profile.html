<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClanHub | Soldier Profile</title>
    <link rel="stylesheet" href="profile.css">
</head>
<body>

    <header class="profile-header">
        <div class="avatar-wrapper">
            <div class="avatar">👤</div>
        </div>
        <div class="user-stats">
            <div class="stat-item"><b>12</b><span>Wars</span></div>
            <div class="stat-item"><b>450</b><span>Kills</span></div>
            <div class="stat-item"><b>7</b><span>Clans</span></div>
        </div>
    </header>

    <section class="profile-info">
        <h2 class="username" id="display-email">RECRUIT</h2>
        <div class="bio">
            <p>PROJECT MAYHEM OPERATIVE</p>
            <p style="color: #666; font-size: 0.7rem;" id="display-uid">UID: ---</p>
        </div>
    </section>

    <div class="action-btns">
        <div class="btn">Edit Profile</div>
        <div class="btn btn-logout" id="logout-btn">Log Out</div>
    </div>

    <div class="achievement-grid">
        <div class="grid-item">🎖️</div>
        <div class="grid-item">⚔️</div>
        <div class="grid-item">🔥</div>
        <div class="grid-item">💣</div>
        <div class="grid-item">🗡️</div>
        <div class="grid-item">🛡️</div>
    </div>

    <div id="nav-placeholder"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCUM-UWPTMi_lVSOROrzkkp5ceZrh67Ev0",
            authDomain: "clanhub-82f8c.firebaseapp.com",
            projectId: "clanhub-82f8c",
            storageBucket: "clanhub-82f8c.firebasestorage.app",
            messagingSenderId: "690675796813",
            appId: "1:690675796813:web:9cbafb424391ef258a8504"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.body.style.display = "block";
                document.getElementById('display-email').textContent = user.email.split('@')[0].toUpperCase();
                document.getElementById('display-uid').textContent = "ID: " + user.uid.substring(0, 12) + "...";
            } else {
                window.location.href = "login.html";
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth).then(() => { window.location.href = "login.html"; });
        });

        // Load Nav
        fetch('nav.html')
            .then(res => res.text())
            .then(data => {
                document.getElementById('nav-placeholder').innerHTML = data;
                // Highlight profile icon
                const profLink = document.querySelector('a[href="profile.html"]');
                if(profLink) profLink.classList.add('active');
            });
    </script>
</body>
</html>
