<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClanHub | Profile</title>
    <link rel="stylesheet" href="profile.css">
</head>
<body>

    <div class="main-wrapper">
        <h1 class="page-title">Profile</h1>

        <div class="user-featured-card">
            <div class="user-card-layout">
                <div class="large-avatar">👤</div>
                <div class="user-meta">
                    <h2 class="user-display-name" id="display-email">LOADING...</h2>
                    <p class="user-display-sub" id="display-uid">UID: ---</p>
                </div>
            </div>
        </div>

        <div class="section-header">
            <div class="clan-branding">
                <div class="mini-clan-icon">🍐</div>
                <div class="clan-title-box">
                    <h3>My Clan <span class="edit-icon">✏️</span></h3>
                    <p class="clan-id-label">Clan id :-555971445221</p>
                </div>
            </div>
        </div>

        <div class="roster-card">
            <div class="member-row">
                <div class="member-avatar">👤</div>
                <div class="member-info">
                    <h4>Elynn Lee</h4>
                    <p>email@fakedomain.net</p>
                </div>
            </div>
            <div class="member-row">
                <div class="member-avatar">👤</div>
                <div class="member-info">
                    <h4>Oscar Dum</h4>
                    <p>email@fakedomain.net</p>
                </div>
            </div>
            <div class="member-row">
                <div class="member-avatar">👤</div>
                <div class="member-info">
                    <h4>Carlo Emilion</h4>
                    <p>email@fakedomain.net</p>
                </div>
            </div>
            <div class="member-row">
                <div class="member-avatar">👤</div>
                <div class="member-info">
                    <h4>Daniel Jay Park</h4>
                    <p>djpark@gmail.com</p>
                </div>
            </div>
            <div class="member-row">
                <div class="member-avatar">👤</div>
                <div class="member-info">
                    <h4>Mark Rojas</h4>
                    <p>rojasmar@skiff.com</p>
                </div>
            </div>
        </div>

        <button id="logout-btn" class="system-btn-logout">Sign Out From Post</button>
    </div>

    <div id="nav-placeholder"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCUM-UWPTMi_lVSOROrzkkp5ceZrh67Ev0",
            authDomain: "clanhub-82f8c.firebaseapp.com",
            projectId: "clanhub-82f8c",
            storageBucket: "clanhub-82f8c.firebasestorage.app",
            messagingSenderId: "690675796813",
            appId: "1:690675796813:web:9cbafb424391ef258a8504"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.body.style.display = "block";
                document.getElementById('display-email').textContent = user.email.split('@')[0].toUpperCase();
                document.getElementById('display-uid').textContent = "ID: " + user.uid.substring(0, 12);
            } else {
                window.location.href = "login.html";
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth).then(() => { window.location.href = "login.html"; });
        });

        fetch('nav.html')
            .then(res => res.text())
            .then(data => {
                document.getElementById('nav-placeholder').innerHTML = data;
                const profLink = document.querySelector('a[href="profile.html"]');
                if(profLink) {
                    // Strip other actives and keep profile pink
                    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                    profLink.classList.add('active');
                }
            });
    </script>
</body>
</html>
