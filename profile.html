<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClanHub | Soldier Profile</title>
    <link rel="stylesheet" href="login.css"> <style>
        body { display: none; background: #000; color: #fff; padding: 20px; }
        .profile-card {
            border: 2px solid #333;
            padding: 30px;
            margin-top: 50px;
            box-shadow: 10px 10px 0px #ff1493;
        }
        .stat-line { margin: 15px 0; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .label { color: #ff1493; font-size: 0.8rem; letter-spacing: 2px; }
        .value { font-size: 1.2rem; word-break: break-all; }
        .logout-danger {
            margin-top: 40px;
            background: #ff1493;
            color: #000;
            padding: 10px;
            width: 100%;
            border: none;
            font-family: 'Stardos Stencil', cursive;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>SOLDIER PROFILE</h1>
    
    <div class="profile-card">
        <div class="stat-line">
            <div class="label">IDENTIFICATION</div>
            <div class="value" id="prof-email">LOADING...</div>
        </div>
        <div class="stat-line">
            <div class="label">SOLDIER UID</div>
            <div class="value" id="prof-uid">---</div>
        </div>
        <div class="stat-line">
            <div class="label">RANK</div>
            <div class="value">RECRUIT</div>
        </div>

        <button id="logout-btn" class="logout-danger">ABANDON POST (LOGOUT)</button>
    </div>

    <div id="nav-placeholder"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Use your existing config
        const firebaseConfig = {
            apiKey: "AIzaSyCUM-UWPTMi_lVSOROrzkkp5ceZrh67Ev0",
            authDomain: "clanhub-82f8c.firebaseapp.com",
            projectId: "clanhub-82f8c",
            storageBucket: "clanhub-82f8c.firebasestorage.app",
            messagingSenderId: "690675796813",
            appId: "1:690675796813:web:9cbafb424391ef258a8504"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.body.style.display = "block";
                document.getElementById('prof-email').textContent = user.email.toUpperCase();
                document.getElementById('prof-uid').textContent = user.uid;
            } else {
                window.location.href = "login.html";
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth).then(() => { window.location.href = "login.html"; });
        });
    </script>

    <script>
        fetch('nav.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('nav-placeholder').innerHTML = data;
            });
    </script>
</body>
</html>
