<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Clan Hub - Free Radar</title>

  <script type="module" src="app.js" defer></script>
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  
  <link rel="stylesheet" href="map.css">
</head>
<body>

  <div id="map"></div>

  <div class="locate-btn" onclick="updateLocation(true)">🎯</div>

  <div class="distance-panel" id="dist-panel">
    <h3 id="target-name">Location</h3>
    <p id="target-address" style="font-size:13px; color:#94a3b8;">Scanning distance...</p>
    <div class="km-badge" id="km-val">0 km</div>
  </div>

  <div id="navbar-placeholder"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    let map;
    let userMarker;
    let currentPos = [0, 0];

    function initMap() {
      map = L.map('map', { zoomControl: false, attributionControl: false }).setView([20, 0], 2);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 }).addTo(map);

      userMarker = L.circleMarker([0, 0], {
        radius: 10, fillColor: "#6366f1", color: "#fff", weight: 2, opacity: 1, fillOpacity: 0.8
      }).addTo(map);

      // Testing Marker
      const clanPos = [22.7600, 75.9000];
      L.marker(clanPos).addTo(map).on('click', () => {
        const distMeters = map.distance(userMarker.getLatLng(), clanPos);
        document.getElementById("target-name").innerText = "Clan Alpha HQ";
        document.getElementById("km-val").innerText = (distMeters / 1000).toFixed(2) + " km away";
        document.getElementById("dist-panel").style.display = "block";
        map.flyTo(clanPos, 15);
      });

      if (window.updateLocation) {
        window.updateLocation(true);
      }
    }

    window.updateLocation = function(shouldFly = false) {
      if (!navigator.geolocation) {
        alert("GPS not supported.");
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (position) => {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          currentPos = [lat, lng];
          if(userMarker) userMarker.setLatLng(currentPos);
          if (shouldFly && map) {
            document.getElementById("dist-panel").style.display = "none";
            map.flyTo(currentPos, 16);
          }
        },
        (error) => console.error("GPS Error:", error),
        { enableHighAccuracy: true }
      );
    }

    window.addEventListener("DOMContentLoaded", initMap);
  </script>
</body>
</html>
