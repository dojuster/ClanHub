<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ClanHub | Dashboard</title>
    <style>
        /* Hide the page initially to prevent flashing private data */
        body { display: none; background-color: #1a1a1a; color: white; font-family: sans-serif; }
    </style>
</head>
<body>

    <div id="dashboard-content">
        <h1>ClanHub Dashboard</h1>
        <p>Logged in as: <span id="user-display">Loading...</span></p>
        <button id="logout-btn">Logout</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCUM-UWPTMi_lVSOROrzkkp5ceZrh67Ev0",
            authDomain: "clanhub-82f8c.firebaseapp.com",
            projectId: "clanhub-82f8c",
            storageBucket: "clanhub-82f8c.firebasestorage.app",
            messagingSenderId: "690675796813",
            appId: "1:690675796813:web:9cbafb424391ef258a8504"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // 1. IMMEDIATELY show the body so the screen isn't white
                document.body.style.display = "block";
                document.getElementById('user-display').textContent = user.email;

                // 2. Attempt to update Firestore (wrapped in try/catch)
                try {
                    await setDoc(doc(db, "active_members", user.uid), {
                        email: user.email,
                        last_seen: serverTimestamp(),
                        status: "Online"
                    }, { merge: true });
                    console.log("Status updated in Firestore");
                } catch (e) {
                    console.error("Firestore Error (Check your Rules!):", e);
                }
            } else {
                // Not logged in
                window.location.href = "login.html";
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth).then(() => { window.location.href = "login.html"; });
        });
    </script>
</body>
</html>
