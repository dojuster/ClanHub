<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClanHub | Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            display: none; 
            background-color: #000; 
            color: white; 
            font-family: 'Special Elite', sans-serif;
            min-height: 100vh; /* Uses full phone height */
            width: 100vw;  /* Uses full phone width */
            padding: 20px;
        }

        #dashboard-content {
            width: 100%;
            text-align: center;
            padding-top: 20px;
        }

        /* Prevent content from hiding under the bottom nav bar */
        body { padding-bottom: 80px; } 
    </style>
</head>
<body>

    <div id="dashboard-content">
        <h1>WAR ROOM</h1>
        <p style="color: #ff1493; margin: 10px 0;">IDENTITY: <span id="user-display">VERIFYING...</span></p>
    </div>

    <div id="nav-placeholder"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCUM-UWPTMi_lVSOROrzkkp5ceZrh67Ev0",
            authDomain: "clanhub-82f8c.firebaseapp.com",
            projectId: "clanhub-82f8c",
            storageBucket: "clanhub-82f8c.firebasestorage.app",
            messagingSenderId: "690675796813",
            appId: "1:690675796813:web:9cbafb424391ef258a8504"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.body.style.display = "block";
                document.getElementById('user-display').textContent = user.email;

                try {
                    await setDoc(doc(db, "active_members", user.uid), {
                        email: user.email,
                        last_seen: serverTimestamp(),
                        status: "Online"
                    }, { merge: true });
                } catch (e) {
                    console.error("Firestore Error:", e);
                }
            } else {
                window.location.href = "login.html";
            }
        });

        // Delegate logout for injected nav bar
        document.addEventListener('click', (e) => {
            if (e.target.id === 'logout-btn' || e.target.closest('#logout-btn')) {
                signOut(auth).then(() => { window.location.href = "login.html"; });
            }
        });
    </script>

    <script>
        fetch('nav.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('nav-placeholder').innerHTML = data;
            });
    </script>
</body>
</html>
