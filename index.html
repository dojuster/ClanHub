<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - ClanHub</title>
  
  <!-- 1. Script with 'defer' for immediate, blink-free injection -->
  <script type="module" src="app.js" defer></script>
  
  <link rel="stylesheet" href="style.css">

  <style>
    /* 2. Placeholder CSS: Keeps the layout stable while app.js loads nav.html */
    #navbar-placeholder {
      display: block;
      width: 100%;
      height: 90px; /* Reserves enough vertical space for the floating nav */
      position: fixed;
      bottom: 0;
      left: 0;
      z-index: 9998; /* Sits behind the actual nav (which is 99999) */
      pointer-events: none; /* Allows interaction with elements behind the empty space */
    }

    /* 3. Global Padding: Prevents dashboard cards from being cut off at the bottom */
    .dashboard-container {
      padding-bottom: 110px; 
    }
  </style>
</head>
<body>

  <div class="dashboard-container">
    <header class="header-card">
      <div class="welcome-text">
        <h1>ClanHub Feed</h1>
        <p>Welcome, <span id="user-full-name">Guest</span>!</p>
        <small id="user-member-id"></small>
      </div>
    </header>

    <main class="feed-card">
      <div class="empty-state-icon">🌐</div>
      <h2>Your Social Feed</h2>
      <p>Explore hot discussions within your clan circles.</p>
    </main>
  </div>

  <!-- 4. The Placeholder for injection -->
  <div id="navbar-placeholder"></div>

</body>
</html>
