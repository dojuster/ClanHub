<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClanHub | War Room</title>
    <link rel="stylesheet" href="index.css">
</head>
<body style="display: none;"> <header>
        <h1>WAR ROOM</h1>
        <div class="identity-banner">
            <span class="live-indicator"></span> 
            OPERATIVE: <span id="user-display">VERIFYING...</span>
        </div>
    </header>

    <main class="feed-container">
        <div class="war-card">
            <div class="card-title">SYSTEM STATUS</div>
            <div class="card-content">All nodes operational. Crypto-mining active at 1470.85 kH/s.</div>
            <div class="card-time">JUST NOW</div>
        </div>

        <div class="war-card" style="border-left-color: var(--neon-pink);">
            <div class="card-title">CLAN MISSION</div>
            <div class="card-content">Infiltrate the 'Imagery' machine on Hack The Box. Target IP: 10.10.11.88.</div>
            <div class="card-time">2 HOURS AGO</div>
        </div>
    </main>

    <div id="nav-placeholder"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCUM-UWPTMi_lVSOROrzkkp5ceZrh67Ev0",
            authDomain: "clanhub-82f8c.firebaseapp.com",
            projectId: "clanhub-82f8c",
            storageBucket: "clanhub-82f8c.firebasestorage.app",
            messagingSenderId: "690675796813",
            appId: "1:690675796813:web:9cbafb424391ef258a8504"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.body.style.display = "block";
                document.getElementById('user-display').textContent = user.email.split('@')[0].toUpperCase();

                try {
                    await setDoc(doc(db, "active_members", user.uid), {
                        email: user.email,
                        last_seen: serverTimestamp(),
                        status: "Online"
                    }, { merge: true });
                } catch (e) {
                    console.error("Firestore Error:", e);
                }
            } else {
                window.location.href = "login.html";
            }
        });

        // Logout delegation
        document.addEventListener('click', (e) => {
            if (e.target.id === 'logout-btn' || e.target.closest('#logout-btn')) {
                signOut(auth).then(() => { window.location.href = "login.html"; });
            }
        });
    </script>

    <script>
        fetch('nav.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('nav-placeholder').innerHTML = data;
                
                const path = window.location.pathname;
                if (path.includes('index.html') || path.endsWith('/')) {
                    const warLink = document.getElementById('link-war');
                    if(warLink) warLink.classList.add('active');
                }
            });
    </script>
</body>
</html>
