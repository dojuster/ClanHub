<div id="user-display">Loading...</div>
<button id="logout-btn">Logout</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // You MUST include your firebaseConfig here too, or link to your auth.js
    const firebaseConfig = {
      apiKey: "AIzaSyCUM-UWPTMi_lVSOROrzkkp5ceZrh67Ev0",
      authDomain: "clanhub-82f8c.firebaseapp.com",
      projectId: "clanhub-82f8c",
      // ... the rest of your config
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('user-display').textContent = user.email;
      } else {
        window.location.href = "login.html"; 
      }
    });

    document.getElementById('logout-btn').addEventListener('click', () => {
      signOut(auth).then(() => { window.location.href = "login.html"; });
    });
</script>
